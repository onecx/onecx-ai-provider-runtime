---
openapi: 3.0.3
info:
  title: onecx-ai-provider-runtime internal service
  version: 1.0.0
servers:
  - url: "http://onecx-ai-provider-runtime:8080"
tags:
  - name: runtimeInternal
paths:
  /internal/runtime/chat:
    post:
      tags:
        - runtimeInternal
      summary: Invoke an AI runtime from a resolved configuration snapshot
      operationId: chat
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RuntimeChatRequest'
      responses:
        "200":
          description: Runtime invocation result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RuntimeChatResponse'
        "400":
          description: Bad runtime request
components:
  schemas:
    RuntimeChatRequest:
      type: object
      required:
        - chatRequest
        - rootAgent
      properties:
        chatRequest:
          $ref: '#/components/schemas/ChatRequest'
        rootAgent:
          $ref: '#/components/schemas/AgentSnapshot'
    RuntimeChatResponse:
      type: object
      required:
        - status
      properties:
        message:
          type: string
        status:
          $ref: '#/components/schemas/RuntimeStatus'
        errorType:
          type: string
        errorMessage:
          type: string
    RuntimeStatus:
      type: string
      enum:
        - SUCCESS
        - FAILED
        - TIMEOUT
    ChatRequest:
      type: object
      properties:
        requestContext:
          $ref: '#/components/schemas/RequestContext'
        chatMessage:
          $ref: '#/components/schemas/ChatMessage'
        conversation:
          $ref: '#/components/schemas/Conversation'
    RequestContext:
      type: object
      properties:
        filter:
          $ref: '#/components/schemas/AgentFilter'
        aiContext:
          type: object
          additionalProperties:
            type: string
    AgentFilter:
      type: object
      properties:
        key:
          type: string
        value:
          type: string
    ChatMessage:
      type: object
      properties:
        conversationId:
          type: string
        message:
          type: string
        type:
          type: string
        creationDate:
          type: integer
          format: int64
    Conversation:
      type: object
      properties:
        conversationId:
          type: string
        history:
          type: array
          items:
            $ref: '#/components/schemas/ChatMessage'
        conversationType:
          type: string
    AgentSnapshot:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        additionalPrompt:
          type: string
        a2aEnabled:
          type: boolean
        status:
          type: string
        model:
          $ref: '#/components/schemas/ModelSnapshot'
        scaffold:
          $ref: '#/components/schemas/ScaffoldSnapshot'
        tools:
          type: array
          items:
            $ref: '#/components/schemas/ToolSnapshot'
        groups:
          type: array
          items:
            $ref: '#/components/schemas/AgentGroupSnapshot'
    ProviderSnapshot:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        type:
          type: string
        description:
          type: string
        llmUrl:
          type: string
        apiKey:
          type: string
        authMode:
          type: string
    ModelSnapshot:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        modelIdentifier:
          type: string
        modelConfig:
          type: string
        communicationMode:
          type: string
        provider:
          $ref: '#/components/schemas/ProviderSnapshot'
    ScaffoldSnapshot:
      type: object
      properties:
        id:
          type: string
        source:
          type: string
          enum:
            - TENANT
            - GLOBAL
        name:
          type: string
        systemPrompt:
          type: string
        sourceProduct:
          type: string
        skills:
          type: array
          items:
            $ref: '#/components/schemas/SkillSnapshot'
    SkillSnapshot:
      type: object
      properties:
        id:
          type: string
        source:
          type: string
          enum:
            - TENANT
            - GLOBAL
        name:
          type: string
        description:
          type: string
        instruction:
          type: string
    ToolSnapshot:
      type: object
      properties:
        id:
          type: string
        source:
          type: string
          enum:
            - TENANT
            - GLOBAL
        name:
          type: string
        description:
          type: string
        type:
          type: string
        url:
          type: string
        apiKey:
          type: string
        authMode:
          type: string
    AgentGroupSnapshot:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        routingInstructions:
          type: string
        orchestrationMode:
          type: string
        responseStrategy:
          type: string
        agents:
          type: array
          items:
            $ref: '#/components/schemas/AgentSnapshot'
        externalAgents:
          type: array
          items:
            $ref: '#/components/schemas/ExternalAgentSnapshot'
    ExternalAgentSnapshot:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        discoveryUrl:
          type: string
        apiKey:
          type: string
        authMode:
          type: string
        enabled:
          type: boolean
